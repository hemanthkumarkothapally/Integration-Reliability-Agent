_schema-version: 3.3.0

ID: integration-reliability-agent

description: An Integration Reliability Agent Application (Managed).

version: 1.0.0

modules:

  - name: integration-reliability-agent-srv
    type: nodejs

    path: gen/srv

    requires:

      - name: integration-reliability-agent-auth

      - name: integration-reliability-agent-db

      - name: integration-reliability-agent-destination-service

    provides:

      - name: srv-api

        properties:

          srv-url: ${default-url}

    parameters:

      buildpack: nodejs_buildpack

      instances: 1

    build-parameters:

      builder: npm-ci

  - name: integration-reliability-agent-db-deployer

    type: hdb

    path: gen/db

    requires:

      - name: integration-reliability-agent-db

    parameters:

      buildpack: nodejs_buildpack

  - name: integration-reliability-agent-destination-content

    type: com.sap.application.content

    requires:

      - name: integration-reliability-agent-destination-service

        parameters:

          content-target: true

      - name: integration-reliability-agent-repo-host

        parameters:

          service-key:

            name: integration-reliability-agent-repo-host-key

      - name: integration-reliability-agent-auth

        parameters:

          service-key:

            name: integration-reliability-agent-auth-key

    parameters:

      content:

        instance:

          destinations:

            - Name: ira_repo_host

              ServiceInstanceName: integration-reliability-agent-html5-service

              ServiceKeyName: integration-reliability-agent-repo-host-key

              sap.cloud.service: iraservice

            - Authentication: OAuth2UserTokenExchange

              Name: ira_auth

              ServiceInstanceName: integration-reliability-agent-auth

              ServiceKeyName: integration-reliability-agent-auth-key

              sap.cloud.service: iraservice

          existing_destinations_policy: update

    build-parameters:

      no-source: true

  - name: integration-reliability-agent-app-content

    type: com.sap.application.content

    path: .

    requires:

      - name: integration-reliability-agent-repo-host

        parameters:

          content-target: true

    build-parameters:

      build-result: resources

      requires:

        - artifacts:

            - comcytechiesintegrationreliabilityincidentclusters.zip

          name: comcytechiesintegrationreliabilityincidentclusters

          target-path: resources/

        - artifacts:

            - comcytechiesintegrationreliabilityincidentclustersui.zip

          name: comcytechiesintegrationreliabilityincidentclustersui

          target-path: resources/

  - name: comcytechiesintegrationreliabilityincidentclusters

    type: html5

    path: app/incidentclusters

    build-parameters:

      build-result: dist

      builder: custom

      commands:

        - npm install

        - npm run build:cf

      supported-platforms:
        []

  - name: comcytechiesintegrationreliabilityincidentclustersui

    type: html5

    path: app/incidentclustersui

    build-parameters:

      build-result: dist

      builder: custom

      commands:

        - npm install

        - npm run build:cf

      supported-platforms:
        []

resources:

  - name: integration-reliability-agent-auth

    type: org.cloudfoundry.managed-service

    parameters:

      config:

        oauth2-configuration:

          credential-types:

            - binding-secret

            - x509

        tenant-mode: dedicated

        xsappname: integration-reliability-agent-${org}-${space}

      path: ./xs-security.json

      service: xsuaa

      service-plan: application

  - name: integration-reliability-agent-db

    type: com.sap.xs.hdi-container

    parameters:

      service: hana

      service-plan: hdi-shared

  - name: integration-reliability-agent-repo-host

    type: org.cloudfoundry.managed-service

    parameters:

      service: html5-apps-repo

      service-name: integration-reliability-agent-html5-service

      service-plan: app-host

  - name: integration-reliability-agent-destination-service

    type: org.cloudfoundry.managed-service

    parameters:

      config:

        HTML5Runtime_enabled: true

        init_data:

          instance:

            destinations:

              - Authentication: NoAuthentication

                Name: ui5

                ProxyType: Internet

                Type: HTTP

                URL: https://ui5.sap.com

              - Authentication: NoAuthentication

                HTML5.DynamicDestination: true

                HTML5.ForwardAuthToken: true

                Name: srv-api

                ProxyType: Internet

                Type: HTTP

                URL: ~{srv-api/srv-url}

            existing_destinations_policy: update

      version: 1.0.0

      service: destination

      service-name: integration-reliability-agent-destination-service

      service-plan: lite

    requires:

      - name: srv-api

parameters:

  deploy_mode: html5-repo

  enable-parallel-deployments: true

build-parameters:

  before-all:

    - builder: custom

      commands:

        - npm ci

        - npx cds build --production
