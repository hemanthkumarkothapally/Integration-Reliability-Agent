trigger:
  branches:
    include:
      - develop
      - main

pr:
  branches:
    include:
      - develop
      - main

variables:
  # Linking your library secrets
  - group: btp-vars

stages:
  - stage: Build
    displayName: 'Build Full-Stack App'
    jobs:
      - job: BuildJob
        pool:
          name: BTP-Self-Hosted
        steps:
          # UPDATE 1: Removed NodeTool to stop the "Node 10" ghost download
          # Instead, we verify the system node version immediately
          - script: |
              node -v
              npm -v
              make -v
            displayName: 'Verify System Node Version'

          - script: npm install
            displayName: 'npm install'

          - script: npx cds build
            displayName: 'CAP CDS Build'

          - script: npx mbt build
            displayName: 'Generate MTAR'

          # UPDATE 2: Use wildcards for the MTAR file. 
          # This captures 'integration-reliability-agent_1.0.0.mtar' (or any version)
          - task: CopyFiles@2
            displayName: 'Collect MTAR'
            inputs:
              SourceFolder: '$(System.DefaultWorkingDirectory)/mta_archives'
              Contents: '*.mtar' 
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish FullStackPackage'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'FullStackPackage'

  - stage: Deploy
    displayName: 'Deploy to BTP'
    dependsOn: Build
    # Only deploy on a real merge to develop
    condition: |
      and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/develop'), 
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
    - job: DeployJob
      pool:
        name: BTP-Self-Hosted
      steps:
        - download: current
          artifact: FullStackPackage
          displayName: 'Download MTAR'

        - script: |
            echo "Logging into Cloud Foundry..."
            # Using the full path ensures it works even if the Path variable is acting up
            C:\tools\cf\cf.exe login -u "$(CF-USER)" -p "$(CF-PASSWORD)" -a "$(CF-API)" -o "$(CF-ORG)" -s "$(CF-SPACE)"
            
            echo "Deploying Full-Stack App..."
            "C:\tools\cf\cf.exe" deploy "$(Pipeline.Workspace)\FullStackPackage\integration-reliability-agent_1.0.0.mtar" -f
          displayName: 'CF Deploy'
          env:
            CF-PASSWORD: $(CF-PASSWORD)