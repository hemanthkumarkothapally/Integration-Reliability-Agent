trigger:
  branches:
    include:
      - develop
      - main
 
pr:
  branches:
    include:
      - develop
      - main
 
stages:
  - stage: Build
    displayName: Build CAP App
    jobs:
      - job: BuildJob
        displayName: Build and Validate
        pool:
          name: BTP-Self-Hosted
 
        steps:
          - task: NodeTool@0
            inputs:
              versionSource: 'spec'
              versionSpec: '20.x'
              checkLatest: true
            displayName: 'Install Node.js 20'
 
          - task: CmdLine@2
            displayName: 'npm install'
            inputs:
              script: 'npm install'
 
          - task: CmdLine@2
            displayName: 'cds build'
            inputs:
              script: 'npx @sap/cds-dk build'
 
          - task: CmdLine@2
            displayName: 'Lint check'
            inputs:
              script: 'npm run lint --if-present'