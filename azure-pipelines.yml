trigger:
  branches:
    include:
      - develop
      - main

pr:
  branches:
    include:
      - develop
      - main

variables:
  # MTAR file generated by mbt build
  - name: mtarFileName
    value: 'integration-reliability-agent_1.0.0.mtar'

  # Variable group containing:
  # CF-USER
  # CF-PASSWORD
  # CF-API
  # CF-ORG
  # CF-SPACE
  - group: btp-vars

stages:

# =========================================================
# STAGE 1 - BUILD
# =========================================================
- stage: Build
  displayName: 'Build CAP App'

  jobs:
    - job: BuildJob
      displayName: 'Build and Validate'

      pool:
        name: BTP-Self-Hosted

      steps:

        # -----------------------------------------
        # Install Node.js
        # -----------------------------------------
        - task: NodeTool@1
          displayName: 'Install Node.js 20'
          inputs:
            versionSpec: '20.x'
            checkLatest: true

        # -----------------------------------------
        # Install Dependencies
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'npm install'
          inputs:
            script: |
              npm install

        # -----------------------------------------
        # CAP Build
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'cds build'
          inputs:
            script: |
              npx cds build

        # -----------------------------------------
        # Lint Validation
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'Lint check'
          inputs:
            script: |
              npm run lint --if-present

        # -----------------------------------------
        # Install MBT
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'Install MBT'
          inputs:
            script: |
              npm install -g mbt

        # -----------------------------------------
        # Generate MTAR
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'Generate MTAR'
          inputs:
            script: |
              mbt build -t mta_archives

        # -----------------------------------------
        # Verify MTAR Exists
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'Verify MTAR'
          inputs:
            script: |
              echo "Listing generated MTAR files..."
              dir mta_archives

        # -----------------------------------------
        # Publish Artifact
        # -----------------------------------------
        - publish: $(System.DefaultWorkingDirectory)/mta_archives
          artifact: FullStackPackage
          displayName: 'Publish Full-Stack Artifact'


# =========================================================
# STAGE 2 - DEPLOY
# =========================================================
- stage: Deploy
  displayName: 'Deploy to CF Dev'

  dependsOn: Build

  # Deploy only:
  # - if build succeeded
  # - branch is develop
  # - NOT during PR validation
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/develop'),
      ne(variables['Build.Reason'], 'PullRequest')
    )

  jobs:
    - job: DeployJob
      displayName: 'Deploy to SAP BTP'

      pool:
        name: BTP-Self-Hosted

      steps:

        # -----------------------------------------
        # Download Artifact
        # -----------------------------------------
        - download: current
          artifact: FullStackPackage
          displayName: 'Download Full-Stack Package'

        # -----------------------------------------
        # Debug Downloaded Files
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'Verify Downloaded Artifact'
          inputs:
            script: |
              echo "Pipeline Workspace:"
              dir $(Pipeline.Workspace) /s

        # -----------------------------------------
        # Install CF CLI Plugins (Optional)
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'Check CF CLI'
          inputs:
            script: |
              cf -v

        # -----------------------------------------
        # Login and Deploy
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'CF Login and Deploy'
          inputs:
            script: |

              echo "Logging into Cloud Foundry..."

              cf login ^
                -u "$(CF-USER)" ^
                -p "$(CF-PASSWORD)" ^
                -a "$(CF-API)" ^
                -o "$(CF-ORG)" ^
                -s "$(CF-SPACE)"

              echo "Current CF Target:"
              cf target

              echo "Deploying MTAR..."

              cf deploy "$(Pipeline.Workspace)\FullStackPackage\$(mtarFileName)" -f

          env:
            CF-PASSWORD: $(CF-PASSWORD)

        # -----------------------------------------
        # Post Deployment Message
        # -----------------------------------------
        - task: CmdLine@2
          displayName: 'Deployment Complete'
          inputs:
            script: |
              echo "Deployment completed successfully!"