trigger:
  branches:
    include:
      - develop
      - main

pr:
  branches:
    include:
      - develop
      - main

variables:
  - name: mtarFileName
    value: 'integration-reliability-agent_1.0.0.mtar' 
  - group: btp-vars

stages:
  - stage: Build
    displayName: Build CAP App
    jobs:
      - job: BuildJob
        pool:
          name: BTP-Self-Hosted
        steps:
          - task: NodeTool@1
            displayName: 'Install Node.js 20'
            inputs:
              versionSpec: '20.x'
              # This ensures it downloads it if not found on the agent
              checkLatest: true

          - script: npm install
            displayName: 'npm install'

          - script: npx cds build
            displayName: 'cds build'

          # Fix 1: Removed the trailing -t to use default mta_archives folder
          - script: npx mbt build
            displayName: 'Generate MTAR'

          # Fix 2: Use CopyFiles to VERIFY the file exists before publishing
          - task: CopyFiles@2
            displayName: 'Collect MTAR'
            inputs:
              SourceFolder: '$(System.DefaultWorkingDirectory)/mta_archives'
              Contents: '$(mtarFileName)'
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish FullStackPackage'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'FullStackPackage'

  - stage: Deploy
    displayName: 'Deploy to CF Dev'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
    - job: DeployJob
      pool:
        name: BTP-Self-Hosted
      steps:
        - download: current
          artifact: FullStackPackage
          displayName: 'Download MTAR'

        - script: |
            echo "Logging into Cloud Foundry..."
            cf login -u "$(CF-USER)" -p "$(CF-PASSWORD)" -a "$(CF-API)" -o "$(CF-ORG)" -s "$(CF-SPACE)"
            
            echo "Deploying to BTP..."
            # Fix 3: Path now matches the artifact name 'FullStackPackage'
            cf deploy $(Pipeline.Workspace)/FullStackPackage/$(mtarFileName) -f
          displayName: 'CF Deploy'
          env:
            CF-PASSWORD: $(CF-PASSWORD)