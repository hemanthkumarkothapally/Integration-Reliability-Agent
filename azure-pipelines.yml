trigger:
  branches:
    include:
      - develop
      - main

pr:
  branches:
    include:
      - develop
      - main

variables:
  # Linking your library secrets
  - group: btp-vars

stages:
  - stage: Build
    displayName: 'Build Full-Stack App'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Explicitly set Node version to ensure consistency on hosted VMs
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
            displayName: 'Install Node.js'

          # Install MBT globally so npx/mbt commands work natively
          - script: npm install -g mbt
            displayName: 'Install Cloud MTA Build Tool (mbt)'

          - script: |
              node -v
              npm -v
              make -v
            displayName: 'Verify System Tools'

          - script: npm install
            displayName: 'npm install'

          - script: npx cds build
            displayName: 'CAP CDS Build'

          - script: npx mbt build
            displayName: 'Generate MTAR'

          - task: CopyFiles@2
            displayName: 'Collect MTAR'
            inputs:
              SourceFolder: '$(System.DefaultWorkingDirectory)/mta_archives'
              Contents: '*.mtar' 
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish FullStackPackage'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'FullStackPackage'

  - stage: Deploy
    displayName: 'Deploy to BTP'
    dependsOn: Build
    # Only deploy on a real merge to develop
    condition: |
      and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/develop'), 
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
    - job: DeployJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - download: current
          artifact: FullStackPackage
          displayName: 'Download MTAR'

        - script: |
            echo "Installing CF MultiApps plugin..."
            cf install-plugin multiapps -f

            echo "Logging into Cloud Foundry..."
            cf login -u "$(CF-USER)" -p "$(CF-PASSWORD)" -a "$(CF-API)" -o "$(CF-ORG)" -s "$(CF-SPACE)"
            
            echo "Deploying Full-Stack App..."
            # Using wildcard ensures version bumps don't break the pipeline
            cf deploy $(Pipeline.Workspace)/FullStackPackage/*.mtar -f
          displayName: 'CF Deploy'
          env:
            CF-PASSWORD: $(CF-PASSWORD)