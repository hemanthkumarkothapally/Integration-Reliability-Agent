trigger:
  branches:
    include:
      - develop
      - main

pr:
  branches:
    include:
      - develop
      - main

stages:
  - stage: Build
    displayName: Build CAP App
    jobs:
      - job: BuildJob
        displayName: Build and Validate
        pool:
          name: BTP-Self-Hosted
          steps:
          - task: NodeTool@1
            displayName: 'Install Node.js 20'
            inputs:
              versionSpec: '20.x'
              checkLatest: true

          - task: CmdLine@2
            displayName: 'npm install'
            inputs:
              script: 'npm install'

          - task: CmdLine@2
            displayName: 'cds build'
            inputs:
              script: 'npx cds build'

          - task: CmdLine@2
            displayName: 'Lint check'
            inputs:
              script: 'npm run lint --if-present'